let scores=[0,0,0,0,0,0,0];
let history=[];
let current=0;
const app=document.getElementById('app');
const MAX=10,MIN=0;

function normalize(sc){return sc.map(v=>1+((v-MIN)/(MAX-MIN))*4);}

function getResult(){
  const norm=normalize(scores);
  let best=null,bestScore=-Infinity;
  ELEMENTS.forEach(e=>{
    let score=0;
    e.profile.forEach((v,i)=>score-=Math.abs(v-norm[i]));
    if(score>bestScore){bestScore=score;best=e;}
  });
  return best;
}

function render(){
  if(current>=QS.length){showResult();return;}
  const q=QS[current];
  const dimIdx=q.dim;
  const dimsDone=Array.from(new Set(QS.slice(0,current).map(x=>x.dim)));
  const pct=Math.round((current/QS.length)*100);
  const pips=DIMS.map((d,i)=>{
    let cls='dim-chip';
    if(dimsDone.includes(i))cls+=' done';
    if(i===dimIdx)cls+=' active';
    return `<span class="${cls}">${d}</span>`;
  }).join('');
  app.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${current} / ${QS.length}</div>
    </div>
    <div class="dim-chips">${pips}</div>
    <div class="dim-label">${DIMS[dimIdx]} — ${DIM_DESC[dimIdx]}</div>
    <div class="q-num">Q${current+1}</div>
    <div class="q-text">${q.q}</div>
    <button class="choice" data-choice="a"><span class="opt-label">A</span>${q.a.t}</button>
    <button class="choice" data-choice="b"><span class="opt-label">B</span>${q.b.t}</button>`;
  const backBtn = current > 0 ? `<button class="back-btn" id="back-btn">← 이전 문항으로</button>` : '';
  app.innerHTML += backBtn;

  let clicking=false;
  app.querySelectorAll('.choice').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(clicking) return;
      clicking=true;
      app.querySelectorAll('.choice').forEach(b=>b.style.opacity='0.5');
      const s=btn.dataset.choice==='a'?q.a.s:q.b.s;
      history.push({scores:[...scores],current});
      s.forEach((v,i)=>scores[i]+=v);
      current++;
      setTimeout(()=>{clicking=false;render();},300);
    });
  });

  const backBtnEl = document.getElementById('back-btn');
  if(backBtnEl){
    backBtnEl.addEventListener('click',()=>{
      if(history.length===0) return;
      const prev=history.pop();
      scores=[...prev.scores];
      current=prev.current;
      render();
    });
  }
}

function showResult(){
  const e=getResult();
    const norm=normalize(scores);
  const pStats={
    에너지: Math.min(99,Math.max(30,Math.round(((norm[0]+norm[3])/2/5)*100))),
    공감력: Math.min(99,Math.max(30,Math.round((norm[5]/5)*100))),
    리더십: Math.min(99,Math.max(30,Math.round(((norm[4]+norm[6])/2/5)*100))),
    창의성: Math.min(99,Math.max(30,Math.round(((norm[4]+norm[0])/2/5)*100))),
    인내력: Math.min(99,Math.max(30,Math.round(((norm[1]+norm[6])/2/5)*100))),
  };
  const bars=Object.entries(pStats).map(([k,v])=>`
    <div class="bar-wrap">
      <div class="bar-label-row"><span>${k}</span><span>${v}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${v}%;background:${e.color}"></div></div>
    </div>`).join('');
  const tags=e.keyword.map(t=>`<span class="tag">${t}</span>`).join('');
  const compat=e.compat.map(x=>`
    <div class="compat-item">
      <div class="compat-sym" style="color:${e.color}">${x.sym}</div>
      <div class="compat-name">${x.kor}</div>
    </div>`).join('');
  app.innerHTML=`
    <div class="result-header">
      <div class="result-sym" style="color:${e.color}">${e.sym}</div>
      <div class="result-num">원자번호 ${e.num}</div>
      <div class="result-name">${e.kor}</div>
      <div class="result-eng">${e.eng}</div>
      <span class="cat-badge" style="background:${e.bg};color:${e.color}">${e.cat}</span>
    </div>
    <div class="result-tagline">"${e.tagline}"</div>
    <div class="result-desc">${e.desc}</div>
    <div class="sw-grid">
      <div class="sw-box"><div class="sw-label">강점</div><div class="sw-val">${e.strength}</div></div>
      <div class="sw-box"><div class="sw-label">주의점</div><div class="sw-val">${e.weakness}</div></div>
    </div>
    <div class="section-title">성향 지표</div>
    <div style="margin-bottom:20px">${bars}</div>
    <div class="section-title">나를 표현하는 키워드</div>
    <div class="tags">${tags}</div>
    <div class="section-title" style="margin-top:16px">잘 맞는 원소 (궁합)</div>
    <div class="compat-row">${compat}</div>
    <a href="https://forms.gle/7bqDNE44MZdXAJWF9" target="_blank" style="display:block;width:100%;padding:14px;border-radius:12px;border:1.5px solid ${e.color};background:${e.bg};cursor:pointer;font-size:14px;color:${e.color};font-weight:500;text-align:center;text-decoration:none;margin-bottom:10px;font-family:inherit">⚛ 설문 참여하기 (1분)</a>
    <button class="retry-btn" id="retry">↩ 다시 테스트하기</button>
    <div class="share-hint">이 파일을 카카오톡으로 보내면<br>친구도 바로 테스트할 수 있어요</div>`;
  document.getElementById('retry').addEventListener('click',()=>{
    scores=[0,0,0,0,0,0,0];current=0;render();
  });
}
render();
